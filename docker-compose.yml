version: '3.8'

services:
  # WebDAV server for testing
  webdav:
    image: bytemark/webdav
    ports:
      - "4080:80"
    environment:
      AUTH_TYPE: Basic
      USERNAME: admin
      PASSWORD: password
    volumes:
      - webdav_data:/var/lib/dav

  # MCP server for WebDAV operations
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - WEBDAV_ROOT_URL=http://webdav
      - WEBDAV_ROOT_PATH=/
      - WEBDAV_USERNAME=admin
      - WEBDAV_PASSWORD=password
      - SERVER_PORT=3000
      - AUTH_USERNAME=user
      - AUTH_PASSWORD=pass
    depends_on:
      - webdav

volumes:
  webdav_data:
